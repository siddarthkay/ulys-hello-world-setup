# ESO syncs values from Secret Manager into k8s Secrets in the app
# namespace. The ClusterSecretStore "gcp-sm" is created by the server
# bootstrap (cloud-config-server.yml). Refresh interval is short so a
# rotation in SM propagates within a few minutes.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-password
  namespace: app
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: gcp-sm
    kind: ClusterSecretStore
  target:
    name: db-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: ulys-db-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: worker-secret
  namespace: app
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: gcp-sm
    kind: ClusterSecretStore
  target:
    name: worker-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: ulys-worker-secret
