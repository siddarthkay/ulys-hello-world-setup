# Defense-in-depth on top of the HMAC the worker still verifies.
# - worker accepts only from api pods.
# - postgres accepts only from api pods.
# - redis accepts only from api pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-from-api
  namespace: app
spec:
  podSelector:
    matchLabels: { app: worker }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app: api }
      ports:
        - { protocol: TCP, port: 8081 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-from-api
  namespace: app
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app: api }
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-from-api
  namespace: app
spec:
  podSelector:
    matchLabels: { app: redis }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app: api }
      ports:
        - { protocol: TCP, port: 6379 }
