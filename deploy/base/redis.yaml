apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: redis
          image: redis:7-alpine
          args: [redis-server, --save, "", --appendonly, "no"]
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            exec: { command: [redis-cli, ping] }
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: app
spec:
  selector: { app: redis }
  ports:
    - { name: redis, port: 6379, targetPort: redis }
