name: infra

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/app/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/app/web:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [appnet]

volumes:
  caddy_data:
  caddy_config:

networks:
  appnet:
    name: appnet
