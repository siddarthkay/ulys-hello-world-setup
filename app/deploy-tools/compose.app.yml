name: app-${COLOR}

# Per-color (blue/green) compose project. `up` needs every variable below
# set to a real value; `down` only needs the project name + container labels
# already on the running containers, so the `:-x` defaults let us tear down
# without re-supplying images/secrets we don't have at rollback time.

services:
  worker:
    image: ${IMAGE_WORKER:-x}
    container_name: worker-${COLOR}
    restart: unless-stopped
    environment:
      WORKER_SECRET: ${WORKER_SECRET:-x}
      PORT: "8081"
    networks: [appnet]

  api:
    image: ${IMAGE_API:-x}
    container_name: api-${COLOR}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://app:${DB_PASSWORD:-x}@postgres:5432/app?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WORKER_URL: http://worker-${COLOR}:8081
      WORKER_SECRET: ${WORKER_SECRET:-x}
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      PORT: "8080"
    depends_on:
      - worker
    networks: [appnet]

networks:
  appnet:
    name: appnet
    external: true
