name: infra

# Long-lived infrastructure containers: caddy (TLS + reverse proxy + static
# site), postgres (data dir on a TF-managed persistent disk), redis (cache,
# ephemeral by design). All on the appnet bridge so api-${COLOR} containers
# can reach them at fixed hostnames.

services:
  caddy:
    image: ${IMAGE_CADDY_APP}
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Caddyfile is rendered per-deploy by deploy.sh; bind-mounted from host.
      - /opt/app/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      # Caddy's admin API on 127.0.0.1:2019 is up the moment the process is
      # ready to serve requests. wget is in the caddy:alpine base image.
      test: ["CMD", "wget", "-qO-", "--timeout=2", "http://127.0.0.1:2019/config/"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 5s
    networks: [appnet]

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: app
      # PGDATA points at a subdirectory of the bind-mounted volume so
      # initdb doesn't trip over ext4's `lost+found` at the mount root.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Host bind: /opt/app/pgdata is the mount point of the TF-managed
      # google_compute_disk attached to this VM. Survives VM rebuilds.
      - /opt/app/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20
      # initdb on a fresh attached disk plus log replay can chew through
      # ~30s before pg_isready starts succeeding. start_period forgives
      # failures during the warmup window without counting against retries.
      start_period: 30s
    networks: [appnet]

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [appnet]

volumes:
  caddy_data:
  caddy_config:

networks:
  appnet:
    name: appnet
