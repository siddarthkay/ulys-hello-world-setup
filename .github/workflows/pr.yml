name: PR (tests + Terraform plan)

on:
  pull_request:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID:        ${{ secrets.GCP_PROJECT_ID }}
  GCP_TF_STATE_BUCKET:   ${{ secrets.GCP_TF_STATE_BUCKET }}
  GCP_WIF_PROVIDER:      ${{ secrets.GCP_WIF_PROVIDER }}
  GCP_GHA_SA_EMAIL:      ${{ secrets.GCP_GHA_SA_EMAIL }}
  GITHUB_REPO:           ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: make test

  plan:
    runs-on: ubuntu-latest
    needs: test
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - run: make tf-fmt

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_GHA_SA_EMAIL }}

      - run: make tf-init
      - run: make tf-validate
      - run: make tf-plan

      - name: Comment plan on PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: make post-plan-comment
