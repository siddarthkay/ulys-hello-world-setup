name: Deploy on merge to main

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  GCP_PROJECT_ID:        ${{ secrets.GCP_PROJECT_ID }}
  GCP_TF_STATE_BUCKET:   ${{ secrets.GCP_TF_STATE_BUCKET }}
  GCP_WIF_PROVIDER:      ${{ secrets.GCP_WIF_PROVIDER }}
  GCP_GHA_SA_EMAIL:      ${{ secrets.GCP_GHA_SA_EMAIL }}
  GITHUB_REPO:           ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: make test

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    defaults: { run: { shell: bash } }
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          {
            echo "tag=$(echo ${{ github.sha }} | cut -c1-12)"
            echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_GHA_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
        with: { project_id: "${{ secrets.GCP_PROJECT_ID }}" }
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.5 }
      - uses: docker/setup-buildx-action@v3

      - run: make tf-init
      - run: make tf-apply

      - name: Read TF outputs
        id: tfout
        run: make tf-output >> "$GITHUB_OUTPUT"

      - name: Build & push images
        env:
          IMAGE_REGISTRY: ${{ steps.tfout.outputs.registry_repo }}
          IMAGE_TAG:      ${{ steps.meta.outputs.tag }}
          GIT_SHA:        ${{ github.sha }}
          BUILD_TIME:     ${{ steps.meta.outputs.build_time }}
        run: make build-push

      - name: Deploy (wait + scp + canary + smoke)
        env:
          VM_NAME:        ${{ steps.tfout.outputs.vm_name }}
          VM_ZONE:        ${{ steps.tfout.outputs.vm_zone }}
          IMAGE_REGISTRY: ${{ steps.tfout.outputs.registry_repo }}
          IMAGE_TAG:      ${{ steps.meta.outputs.tag }}
          GIT_SHA:        ${{ github.sha }}
          BUILD_TIME:     ${{ steps.meta.outputs.build_time }}
          DOMAIN:         ${{ steps.tfout.outputs.domain }}
        run: make deploy

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deploy summary"
            echo "- Web: https://${{ steps.tfout.outputs.domain }}"
            echo "- API: https://${{ steps.tfout.outputs.domain }}/api"
            echo "- Image tag: \`${{ steps.meta.outputs.tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
